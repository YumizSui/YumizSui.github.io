name: Weekly Dependency Update

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: weekly-dependency-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Install dependencies
        run: npm ci

      - name: Update dependencies within semver range
        run: npm update

      - id: build
        name: Build verification
        continue-on-error: true
        run: npm run build

      - id: diff
        name: Detect changes
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - id: commit
        if: steps.diff.outputs.changed == 'true' && steps.build.outcome == 'success'
        name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(deps): weekly dependency update"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git push

      - name: Open PR on build failure
        if: steps.diff.outputs.changed == 'true' && steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="deps/auto-update"
          git checkout -B "$branch"
          git add package.json package-lock.json
          git commit -m "chore(deps): weekly dependency update (build failing)"
          git push -f -u origin "$branch"
          if ! gh pr view "$branch" --json number >/dev/null 2>&1; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(deps): weekly dependency update (build failing)" \
              --body "Automated weekly dependency update failed \`npm run build\`. Please investigate.

          Failing run: $RUN_URL"
          fi

      - name: Fail workflow if build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "Build verification failed; see Build verification step above."
          exit 1

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      ref: ${{ needs.update.outputs.commit_sha }}
